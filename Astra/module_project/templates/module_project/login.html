<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'module_project/css/style.css' %}?v=5">
</head>

<body>
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">

        <div class="col-md-6 col-lg-5">
            <div class="login-card cosmic-card">

                <div class="login-header cosmic-header">
                    <h2 class="cosmic-title">Вход в аккаунт</h2>
                    <p class="cosmic-subtitle">Продолжите своё путешествие</p>
                </div>

                <div class="login-body">

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="nikname" class="form-label">Никнейм</label>
                            <input type="text" name="nikname" id="nikname" class="form-control" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" name="password" id="password" class="form-control" required>
                        </div>
                        
                        <button type="submit" class="btn-login cosmic-btn">
                            Войти
                        </button>
                        
                        <div class="text-center mt-3">
                            <a href="{% url 'module_project:register' %}" class="cosmic-link">
                                Создать аккаунт
                            </a>
                        </div>

                    </form>

                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
